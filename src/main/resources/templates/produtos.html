<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos - Spring</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #4a90e2; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; color: #555; }
        tr:hover { background-color: #f1f7ff; }
        .badge { background: #d1e7dd; color: #0f5132; padding: 5px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Catálogo de Produtos</h2>

    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Quantidade</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${produtos}">
            <td th:text="${p.nome}">Nome do Produto</td>
            <td th:text="${p.descricao}">Descrição</td>
            <td>
                <span class="badge" th:text="${p.quantidade}">0</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
